<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Job Autofill</title>
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      color: #1a1a1a;
    }
    h2 { font-size: 15px; margin: 0 0 10px; }
    button {
      width: 100%;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    #status.success { display: block; background: #dcfce7; color: #166534; }
    #status.error { display: block; background: #fee2e2; color: #991b1b; }
    #status.info { display: block; background: #dbeafe; color: #1e40af; }
    #settingsLink {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>AI Job Autofill</h2>
  <button id="fillBtn">Fill This Page</button>
  <div id="status"></div>
  <a id="settingsLink">Resume &amp; API key settings</a>

  <!--
    Note: this popup intentionally does NOT contain the resume upload
    or PDF parsing UI. Chrome closes toolbar popups whenever they lose
    focus, which happens as soon as a native file picker opens — so
    anything involving a file dialog lives on the full-tab options
    page instead (opened via chrome.runtime.openOptionsPage()), which
    behaves like a normal page and doesn't auto-close.
  -->
  <script src="popup.js"></script>
</body>
</html>
