<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Job Autofill Setup</title>
  <style>
    body {
      max-width: 480px;
      margin: 40px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      color: #1a1a1a;
      border: 1px solid #eee;
      border-radius: 8px;
    }
    h2 { font-size: 16px; margin: 0 0 12px; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
    input[type="file"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button.secondary { background: #6b7280; margin-top: 6px; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    #status.success { display: block; background: #dcfce7; color: #166534; }
    #status.error { display: block; background: #fee2e2; color: #991b1b; }
    #status.info { display: block; background: #dbeafe; color: #1e40af; }
    #resumePreview {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      max-height: 60px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 6px;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>AI Job Autofill</h2>

  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="AIza...">

  <label for="resumeFile">Resume (PDF)</label>
  <input type="file" id="resumeFile" accept="application/pdf">

  <div id="resumePreview"></div>

  <button id="saveBtn">Save Resume &amp; API Key</button>

  <div id="status"></div>

  <p style="font-size:11px;color:#888;margin-top:16px;">
    This runs as a full tab (not the toolbar popup) so the file picker
    and PDF parsing don't get interrupted. Once saved, close this tab
    and use the extension icon on a job page to autofill.
  </p>

  <!--
    pdf.js must be loaded as a LOCAL file, not from a CDN.
    Manifest V3's default Content Security Policy forbids loading
    and executing remote scripts (script-src 'self'), so a
    <script src="https://cdnjs..."> tag here would be blocked and
    silently fail (or throw a CSP violation in the console).

    Setup steps (one-time):
      1. Download the pre-built pdf.js library files:
         - https://github.com/mozilla/pdf.js/releases
           (grab the "pdfjs-<version>-dist.zip" asset)
      2. From the extracted archive, copy these two files into
         this extension's lib/ folder:
         - build/pdf.min.js         -> lib/pdf.min.js
         - build/pdf.worker.min.js  -> lib/pdf.worker.min.js
      3. That's it — the <script> tag below and the worker path
         in popup.js will pick them up automatically.

    Loading it locally like this keeps everything inside the
    extension's own origin, satisfies MV3's CSP, and means the
    extension keeps working even if the CDN goes down.
  -->
  <script src="lib/pdf.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
